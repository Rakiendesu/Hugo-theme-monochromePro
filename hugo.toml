title = ""
theme = "monochrome"
defaultContentLanguage = "zh"
baseURL = ""

[services]
  [services.disqus]
    shortname = ""
  [services.googleAnalytics]
    id = ""

[params]
  navbar_title = "" #网站名
  footer = "" #页脚
  favicon = "favicon.ico" #网站小图标,可以放在图床然后复制进去
  enable_toc = true
  enable_collapsible_toc = false
  enable_collapsible_changelogs = true
  enable_header_anchor = true
  enable_math = false
  enable_zooming_js = false
  enable_site_search = true
  author = ""
  enable_open_graph = false
  enable_twitter_cards = false
  color_scheme = "light"
  og_image = ""
  primaryColor = "#ff9800" #统一主题颜色

  [params.list_layout]
    enable_group_by_year = true
    enable_show_date = true
    enable_pagination = true



[[menu.navbar]]
  identifier = "home"
  name = "🏠 首页"
  title = "home"
  url = "/"
  weight = 1

[[menu.navbar]]
  identifier = "status"
  name = "💬 动态"
  title = "status"
  url = "/status/"
  weight = 2

[[menu.navbar]]
  identifier = "post"
  name = "✏️ 文章"
  title = "post"
  url = "/post/"
  weight = 3

[[menu.navbar]]
  identifier = "fenlei"
  name = "💼 分类"
  title = "fenlei"
  url = "/fenlei/"
  weight = 5

[[menu.navbar]]
  identifier = "gallery"
