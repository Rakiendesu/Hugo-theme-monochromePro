<div class="post-meta">
    {{/* 新增分类链接 */}}
    {{ with .Params.categories }}
    <span class="meta-category">
        分类：{{ range . }}
        <a href="{{ "/categories/" | relLangURL }}{{ . | urlize }}">{{ . }}</a>
        {{ end }}
    </span>
    {{ end }}
    <span class="meta-date">时间：{{ .Date.Format "2006-01-02" }}</span>
</div>


<style>
.post-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
    color: var(--color-text-secondary, #888);
}

.post-meta .meta-category {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
}

.post-meta .meta-category a {
    display: inline-block;
    padding: .25rem .8rem;
    border-radius: 1rem;
    background: color-mix(in srgb, var(--color-accent) 8%, transparent); /* 匹配 0.08 透明度 */
    border: 1px solid color-mix(in srgb, var(--color-accent) 25%, transparent); /* 匹配 0.25 透明度 */
    color: var(--color-accent); /* 匹配主题文字颜色 */
    text-decoration: none;
    font-weight: 500;
    font-size: .8rem;
    transition: background .25s, border-color .25s;
}

.post-meta .meta-category a:hover {
    background: color-mix(in srgb, var(--color-accent) 18%, transparent); /* 匹配悬浮 0.18 透明度 */
    border-color: var(--color-accent); /* 匹配悬浮边框色 */
}
</style>
