  - name: "post2028"
    label: "2027年文章管理"
    label_singular: "文章"
    description: "管理 content/post/2028 下的所有文章"
    folder: "content/post/2028"
    create: true
    delete: true
    extension: md
    format: frontmatter

    slug: "{{month}}{{day}}{{title}}"

    fields:
      - { label: "标题", name: "title", widget: "string", hint: "文章标题" }
      - { label: "发布日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", format: "YYYY-MM-DD", hint: "格式如：2026-01-17" }
      - { label: "草稿状态", name: "draft", widget: "boolean", default: false, hint: "勾选后文章不会发布" }
      - { label: "作者", name: "author", widget: "string", default: "" }
      - { label: "描述/摘要", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false, hint: "如：NAS, 飞牛" }
