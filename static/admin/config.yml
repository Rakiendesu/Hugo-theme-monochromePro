      - { label: "正文", name: "body", widget: "markdown" }


  # ========== 画廊管理 ==========
  - name: "gallery"
    label: "画廊管理"
    label_singular: "画廊"
    description: "管理 content/gallery 下的相册"
    folder: "content/gallery"
    create: true
    delete: true
    slug: "{{title}}"
    extension: md
    format: frontmatter
    
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "如：ACG, 绘画, 雨中曲" }
      - { label: "发布日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", format: "YYYY-MM-DD", required: true, hint: "必填" }
      - { label: "类型", name: "type", widget: "string", default: "gallery", hint: "固定为 gallery，一般不用改" }
      - { label: "画廊图片", name: "gallery_img_src", widget: "image", required: true, hint: "相册封面图，必填" }
      - { label: "封面图（白天）", name: "bookcase_cover_src", widget: "image", required: true, hint: "白天模式封面，必填" }
      - { label: "封面图（黑夜）", name: "bookcase_cover_src_dark", widget: "image", required: true, hint: "黑夜模式封面，必填" }
      - { label: "分类", name: "categories", widget: "list", required: true, default: ["🖼️相册"], hint: "如：🖼️相册" }
      - { label: "权重", name: "weight", widget: "number", value_type: "int", required: true, hint: "数字越大排序越靠前，必填" }
      - { label: "正文", name: "body", default: "{{< fullscreen >}}\n\n{{< /fullscreen >}}", widget: "markdown" }
