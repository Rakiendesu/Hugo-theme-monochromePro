backend:
  name: git-gateway
  branch: main

publish_mode: simple

# 界面语言
locale: zh-Hans

# 核心：处理中文文件名传输，防止 GitHub API 报错
slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

media_folder: "static/images"
public_folder: "/images"

collections:



  # ========== 2026年文章管理 ==========
  - name: "post2026"
    label: "2026年文章管理"
    label_singular: "文章"
    description: "管理 content/post/2026 下的所有文章"
    folder: "content/post/2026"
    create: true
    delete: true
    extension: md
    format: frontmatter

    slug: "{{month}}{{day}}{{title}}"

    
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "文章标题" }
      - { label: "发布日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", format: "YYYY-MM-DD", hint: "格式如：2026-01-17" }
      - { label: "草稿状态", name: "draft", widget: "boolean", default: false, hint: "勾选后文章不会发布" }
      - { label: "作者", name: "author", widget: "string", default: "" }
      - { label: "描述/摘要", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false, hint: "如：NAS, 飞牛" }
      - { label: "分类", name: "categories", widget: "list", required: false, hint: "如：💻技术" }
      - { label: "封面图（白天）", name: "bookcase_cover_src", widget: "image", required: false }
      - { label: "封面图（黑夜）", name: "bookcase_cover_src_dark", widget: "image", required: false }
      - { label: "画廊资源", name: "gallery_resources", widget: "string", required: false }
      - { label: "权重", name: "weight", widget: "number", value_type: "int", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

